<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Theme-aware favicon: dark tile + skyblue mark in light UI, skyblue tile + navy mark in dark UI -->
    <link rel="icon" type="image/png" href="/favicon-light.png" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/png" href="/favicon-dark.png" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/png" href="/favicon-light.png" id="favicon-fallback" />
    <script>
      // Safari/Chrome ignore `media` on <link rel="icon"> — swap the fallback href by hand
      (function () {
        var mq = window.matchMedia('(prefers-color-scheme: dark)');
        var link = document.getElementById('favicon-fallback');
        function apply() { link.href = mq.matches ? '/favicon-dark.png' : '/favicon-light.png'; }
        apply();
        mq.addEventListener ? mq.addEventListener('change', apply) : mq.addListener(apply);
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FS Architects" />
    <meta name="application-name" content="FS Architects" />
    <meta name="theme-color" content="#1c2b3a" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>FS Architects — Architecture & Interior Design</title>
    <meta name="description" content="FS Architects creates timeless architecture and interior design shaped with clarity and restraint. Based in Mindanao, Philippines." />
    <meta name="keywords" content="FS Architects, architecture Philippines, interior design Mindanao, architectural design, luxury residences" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fsarchitects.ph" />
    <meta property="og:site_name" content="FS Architects" />
    <meta property="og:title" content="FS Architects — Architecture & Interior Design" />
    <meta property="og:description" content="Timeless architecture and interior design. Based in Mindanao, Philippines — from luxury residences to commercial spaces." />
    <meta property="og:image" content="https://fsarchitects.ph/images/og-cover.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="FS Architects — Architecture & Interior Design" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FS Architects — Architecture & Interior Design" />
    <meta name="twitter:description" content="Timeless architecture and interior design. Based in Mindanao, Philippines." />
    <meta name="twitter:image" content="https://fsarchitects.ph/images/og-cover.jpg" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Geist:wght@100..900&display=swap" rel="stylesheet" />
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <!-- Remix Icon — non-blocking: a slow CDN must not delay first paint -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet" /></noscript>

    <script>
      // Installed app saved on the install guide (older iOS uses the saved
      // page, not the manifest start_url) — leave BEFORE the app boots so
      // the guide never flashes on launch.
      if (location.pathname === '/hub/install' && (window.matchMedia('(display-mode: standalone)').matches || navigator.standalone === true)) {
        location.replace('/hub/login');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
